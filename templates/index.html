<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Antigravity Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
</head>
<body>

  <!-- Dotted surface hero background -->
  <div id="dotted-surface" aria-hidden="true"></div>

  <div class="app">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <img src="/logo" alt="Antigravity" class="logo" />
        <div class="topbar-divider"></div>
        <div class="topbar-meta">
          <span class="topbar-title special-text" data-special-text data-text="AI Intelligence" data-speed="18" data-delay="0.3">AI Intelligence</span>
          <span class="topbar-sub" id="last-updated">Loading…</span>
        </div>
      </div>
      <div class="topbar-right">
        <span class="date-display" id="current-date"></span>
        <button class="btn-refresh" id="refresh-btn" onclick="refreshArticles()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
            <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
          </svg>
          Refresh
        </button>
      </div>
    </header>

    <!-- Filter bar -->
    <div class="filter-bar">
      <div class="filter-pills">
        <button class="pill active" data-filter="all" onclick="setFilter('all')">All <span class="pill-count" id="count-all">0</span></button>
        <button class="pill" data-filter="bens_bites" onclick="setFilter('bens_bites')">
          <span class="source-dot" style="background:#21c9d0"></span>Ben's Bites <span class="pill-count" id="count-bens">0</span>
        </button>
        <button class="pill" data-filter="ai_rundown" onclick="setFilter('ai_rundown')">
          <span class="source-dot" style="background:#8B5CF6"></span>The AI Rundown <span class="pill-count" id="count-rundown">0</span>
        </button>
        <button class="pill" data-filter="reddit" onclick="setFilter('reddit')">
          <span class="source-dot" style="background:#FF6314"></span>Reddit <span class="pill-count" id="count-reddit">0</span>
        </button>
        <button class="pill pill-saved" data-filter="saved" onclick="setFilter('saved')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          Saved <span class="pill-count" id="count-saved">0</span>
        </button>
      </div>
    </div>

    <!-- Articles grid -->
    <main class="content">
      <div class="articles-grid" id="articles-grid">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>

      <!-- Empty state -->
      <div class="empty-state" id="empty-state" style="display:none">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </div>
        <p class="empty-title" id="empty-title">No articles found</p>
        <p class="empty-sub" id="empty-sub">Try a different filter or refresh to fetch the latest.</p>
      </div>
    </main>

  </div>

  <script src="/static/special-text.js"></script>
  <script src="/static/dotted-surface.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
